name: Test

on:
  push:
  pull_request:

env:
  EXPECTED_SUBDIR: "3.14.16"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Read root package version
        run: |
          expected_root=$(node -p 'require("./package.json").version')
          echo "EXPECTED_ROOT=$expected_root" >> "$GITHUB_ENV"

      - run: mkdir ./test_1

      - run: |
          echo '{"version": "${{ env.EXPECTED_SUBDIR }}"}' > ./test_1/package.json

      - name: Test root package
        id: root_package_ver
        uses: ./

      - name: Check root result
        uses: actions/github-script@v8
        env:
          EXPECTED: ${{ env.EXPECTED_ROOT }}
          RECEIVED: ${{ steps.root_package_ver.outputs.version }}
        with:
          script: |
            const { EXPECTED, RECEIVED } = process.env;
            if (RECEIVED !== EXPECTED)
              core.setFailed(`Expected [${EXPECTED}], but got [${RECEIVED}]`)

      - name: Test subdirectory package
        id: subdir_package_ver
        uses: ./
        with:
          path: ./test_1

      - name: Check subdirectory result
        uses: actions/github-script@v8
        env:
          EXPECTED: ${{ env.EXPECTED_SUBDIR }}
          RECEIVED: ${{ steps.subdir_package_ver.outputs.version }}
        with:
          script: |
            const { EXPECTED, RECEIVED } = process.env;
            if (RECEIVED !== EXPECTED)
              core.setFailed(`Expected [${EXPECTED}], but got [${RECEIVED}]`)

      - name: Test missing package.json
        id: missing_package
        continue-on-error: true
        uses: ./
        with:
          path: ./missing

      - name: Check missing package failure
        uses: actions/github-script@v8
        env:
          OUTCOME: ${{ steps.missing_package.outcome }}
        with:
          script: |
            if (process.env.OUTCOME !== 'failure') {
              core.setFailed(`Expected failure, but got [${process.env.OUTCOME}]`)
            }

name: Check dist

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check-dist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Rename dist
        run: mv dist dist_original

      - name: Build
        run: npm run build

      - name: Compare
        run: |
          if ! diff -r dist dist_original; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the changes."
            exit 1
          fi
